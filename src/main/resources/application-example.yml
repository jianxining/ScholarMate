server:
  port: 8888
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/
      chat:
        options:
          model: qwen3.6-plus
          temperature: 0.7
          maxTokens: 5000

      embedding:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/
        api-key: ${OPENAI_API_KEY}
        options:
          model: text-embedding-v4
          dimmension: 1024

  datasource:
    url: jdbc:mysql://127.0.0.1:13306/scholar_mate?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8 # 记得改成你自己的
    username: root # 记得改成你自己的
    password: 123456 # 记得改成你自己的
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 60000
      connection-timeout: 30000
      max-lifetime: 1800000

  # Redis 配置
  data:
    redis:
      host: localhost   # 记得改成你自己的
      port: 16379
      database: 0
      timeout: 5s
  #      password: 8uhb*UHB

  # MyBatis-Plus 配置
  mybatis-plus:
    mapper-locations: classpath:mapper/*.xml
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

minio:
  url: http://localhost:9002   # 对外可访问的地址（浏览器访问用，Docker部署时改为宿主机地址）
  accessKey: minioadmin # 记得改成你自己的
  secretKey: minioadmin # 记得改成你自己的
  bucketName: scholar-mate
  endpoint: http://localhost:9002  # MinIO客户端连接地址（Docker内部用）

embeddings:
  store:
    host: 127.0.0.1   # 记得改成你自己的
    port: 5433   # 记得改成你自己的
    database: scholar_mate   # 记得改成你自己的
    user: pgvector   # 记得改成你自己的
    password: pgvector   # 记得改成你自己的

# Tavily 搜索引擎配置
tavily:
  api-key: ${OPENAI_API_KEY}
  mcp-url: https://mcp.tavily.com/mcp/

grsai:
  nanobanana:
    api-key: sk-ec99XXXXXXXXXXXXXX

logging:
  level:
    org:
      springframework:
        ai: INFO
    io:
      modelcontextprotocol:
        client: ERROR
